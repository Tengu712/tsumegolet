version: '3'

tasks:
  debug-build:
    cmds:
      - gradle assembleDebug -Pandroid.useAndroidX=true

  release-build:
    cmds:
      - gradle assembleRelease -Pandroid.useAndroidX=true -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

  run:
    deps:
      - debug-build
    cmds:
      - adb wait-for-device
      - adb install build/outputs/apk/debug/tsumegolet-debug.apk
      - adb shell am start -n com.skdassoc.tsumegolet/.MainActivity

  install:
    deps:
      - release-build
    cmds:
      - adb wait-for-device
      - adb install -r --user 0 build/outputs/apk/release/tsumegolet-release.apk

  test:
    cmds:
      - gradle test -Pandroid.useAndroidX=true --rerun-tasks

  format:
    cmds:
      - cmd: ktfmt --kotlinlang-style ./build.gradle.kts ./settings.gradle.kts $(find ./src ./test -name "*.kt")
        platforms: [darwin, linux]
      - cmd: powershell -Command "ktfmt --kotlinlang-style ./build.gradle.kts ./settings.gradle.kts (Get-ChildItem -Recurse ./src, ./test -Filter *.kt).FullName"
        platforms: [windows]
